global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'restreamer'
    static_configs:
      - targets: ['restreamer:8080']
    metrics_path: '/metrics'
    basic_auth:
      username: admin
      password: ChangeMe123!

  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']
    metrics_path: '/metrics'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: '/metrics'